
<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>King Amxn Official Site</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="icon" href="https://cdn.creativefabrica.com/2021/09/18/KA-logo-design-vector-Graphics-17452350-1.jpg" type="image/png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: #05050a;
      color: #e0f7ff;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* ===== BACKGROUND EFFECTS ===== */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
      filter: brightness(0.3) contrast(1.25) saturate(1.4);
    }

    /* ===== LAYERED OVERLAYS ===== */
    .dark-gradient {
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        transparent 0%,
        rgba(0,0,0,0.5) 50%,
        rgba(0,0,0,0.9) 100%
      );
      pointer-events: none;
      z-index: -2;
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 246, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 246, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: -2;
      opacity: 0.4;
    }

    .tv-scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255, 255, 255, 0.015) 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: -1;
      animation: scan 10s linear infinite;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    /* ===== FLOATING PARTICLES ===== */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(0, 246, 255, 0.4);
      border-radius: 50%;
      animation: float 20s infinite;
      box-shadow: 0 0 10px rgba(0, 246, 255, 0.5);
    }

    @keyframes float {
      0%, 100% { 
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% {
        transform: translateY(-100px) translateX(100px);
        opacity: 0;
      }
    }

    /* ===== UI TOGGLE BUTTON ===== */
    /* Removed: old-ui-toggle no longer used */

    /* ===== MAIN CONTAINER ===== */
    .hub-container {
      backdrop-filter: blur(16px) saturate(180%);
      background: linear-gradient(
        135deg,
        rgba(10, 15, 35, 0.85) 0%,
        rgba(15, 20, 45, 0.75) 50%,
        rgba(10, 15, 35, 0.85) 100%
      );
      border: 1px solid rgba(0, 246, 255, 0.2);
      box-shadow: 
        0 0 80px rgba(0, 246, 255, 0.15),
        0 8px 32px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        inset 0 0 60px rgba(0, 0, 0, 0.5);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
    }

    .hub-container::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(
        45deg,
        transparent 30%,
        rgba(0, 246, 255, 0.1) 50%,
        transparent 70%
      );
      border-radius: 24px;
      z-index: -1;
      animation: border-glow 3s ease-in-out infinite;
    }

    @keyframes border-glow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    /* ===== HEADER TITLE ===== */
    .cyber-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      letter-spacing: 0.15em;
      background: linear-gradient(
        180deg,
        #ffffff 0%,
        #00f6ff 50%,
        #0099ff 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      filter: drop-shadow(0 0 20px rgba(0, 246, 255, 0.6))
              drop-shadow(0 0 40px rgba(0, 246, 255, 0.4));
      animation: title-pulse 3s ease-in-out infinite;
    }

    @keyframes title-pulse {
      0%, 100% {
        filter: drop-shadow(0 0 20px rgba(0, 246, 255, 0.6))
                drop-shadow(0 0 40px rgba(0, 246, 255, 0.4));
      }
      50% {
        filter: drop-shadow(0 0 30px rgba(0, 246, 255, 0.8))
                drop-shadow(0 0 60px rgba(0, 246, 255, 0.6));
      }
    }

    .cyber-title::after {
      content: attr(data-text);
      position: absolute;
      left: 2px;
      top: 2px;
      z-index: -1;
      background: linear-gradient(180deg, #ff00aa, #aa00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: glitch 5s infinite;
    }

    @keyframes glitch {
      0%, 90%, 100% { opacity: 0; transform: translate(0); }
      92% { opacity: 0.7; transform: translate(-3px, 2px); }
      94% { opacity: 0.7; transform: translate(2px, -2px); }
      96% { opacity: 0.7; transform: translate(-2px, 1px); }
    }

    /* ===== SUBTITLE ===== */
    .operator-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      color: rgba(0, 246, 255, 0.8);
      text-shadow: 0 0 10px rgba(0, 246, 255, 0.4);
      position: relative;
      display: inline-block;
      padding: 8px 24px;
      border: 1px solid rgba(0, 246, 255, 0.2);
      border-radius: 6px;
      background: rgba(0, 246, 255, 0.05);
    }

    .operator-tag::before,
    .operator-tag::after {
      content: '//';
      color: rgba(0, 246, 255, 0.5);
      margin: 0 8px;
    }

    /* ===== DEPARTMENT CARDS ===== */
    .dept-card {
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      font-size: 1.1rem;
      border: 2px solid;
      background: rgba(10, 15, 30, 0.6);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 
        0 4px 20px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      padding: 1.5rem;
    }

    /* Animated gradient overlay */
    .dept-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        transparent 0%,
        rgba(255, 255, 255, 0.08) 50%,
        transparent 100%
      );
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .dept-card:hover::before {
      transform: translateX(100%);
    }

    /* Glow effect on hover */
    .dept-card::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      background: inherit;
      z-index: -1;
      filter: blur(15px);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .dept-card:hover::after {
      opacity: 0.7;
    }

    .dept-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 
        0 12px 40px rgba(0, 0, 0, 0.8),
        0 0 30px currentColor,
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .dept-card:active {
      transform: translateY(-4px) scale(1.01);
    }

    /* Icon styling */
    .dept-icon {
      font-size: 2rem;
      margin-right: 0.75rem;
      display: inline-block;
      transition: transform 0.3s ease;
      filter: drop-shadow(0 0 8px currentColor);
    }

    .dept-card:hover .dept-icon {
      transform: rotate(5deg) scale(1.15);
    }

    /* Accessibility: Focus state */
    .dept-card:focus-visible {
      outline: 3px solid currentColor;
      outline-offset: 2px;
    }

    /* Department-specific colors */
    .fib-card {
      border-color: rgba(165, 180, 252, 0.4);
      color: #c7d2fe;
    }
    .fib-card:hover {
      border-color: #a5b4fc;
      color: #e0e7ff;
      background: rgba(10, 15, 30, 0.8);
    }

    .lspd-card {
      border-color: rgba(59, 130, 246, 0.4);
      color: #93c5fd;
    }
    .lspd-card:hover {
      border-color: #3b82f6;
      color: #dbeafe;
      background: rgba(10, 15, 30, 0.8);
    }

    .sahp-card {
      border-color: rgba(251, 146, 60, 0.4);
      color: #fdba74;
    }
    .sahp-card:hover {
      border-color: #fb923c;
      color: #fed7aa;
      background: rgba(10, 15, 30, 0.8);
    }

    .gov-card {
      border-color: rgba(168, 85, 247, 0.4);
      color: #c4b5fd;
    }
    .gov-card:hover {
      border-color: #a855f7;
      color: #e9d5ff;
      background: rgba(10, 15, 30, 0.8);
    }

    .penal-card {
      border-color: rgba(250, 204, 21, 0.5);
      background: linear-gradient(135deg, rgba(20, 18, 0, 0.6), rgba(30, 25, 0, 0.6));
      color: #fef08a;
    }
    .penal-card:hover {
      border-color: #facc15;
      color: #fef9c3;
      background: linear-gradient(135deg, rgba(20, 18, 0, 0.9), rgba(30, 25, 0, 0.9));
    }

    .ng-card {
      border-color: rgba(34, 197, 94, 0.4);
      color: #86efac;
    }
    .ng-card:hover {
      border-color: #22c55e;
      color: #dcfce7;
      background: rgba(10, 15, 30, 0.8);
    }

    .badcops-card {
      border-color: rgba(236, 72, 153, 0.5);
      background: linear-gradient(135deg, rgba(30, 10, 20, 0.7), rgba(25, 5, 30, 0.7));
      color: #f9a8d4;
    }
    .badcops-card:hover {
      border-color: #ec4899;
      color: #fce7f3;
      background: linear-gradient(135deg, rgba(30, 10, 20, 0.95), rgba(25, 5, 30, 0.95));
    }

    .arrest-card {
      border-color: rgba(255, 242, 225, 0.541);
      background: linear-gradient(135deg, rgba(15, 52, 58, 0.7), rgba(43, 40, 40, 0.7));
      color: #00fff2c4;
    }
    .arrest-card:hover {
      border-color: #ffffff;
      color: #dcfce7;
      background: linear-gradient(135deg, rgba(10, 15, 30, 0.8));
    }

    /* ===== GRID LAYOUT ===== */
    .dept-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      auto-rows: 1fr;
    }

    @media (min-width: 768px) {
      .dept-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .dept-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Ensure cards are equal height */
    .dept-grid > * {
      min-height: 120px;
    }

    /* ===== STATUS BAR ===== */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      background: rgba(0, 0, 0, 0.5);
      border-top: 2px solid rgba(0, 246, 255, 0.2);
      border-radius: 0 0 24px 24px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      color: rgba(0, 246, 255, 0.7);
      margin-top: 2rem;
      transition: all 0.3s ease;
    }

    .status-bar:hover {
      background: rgba(0, 0, 0, 0.6);
      border-top-color: rgba(0, 246, 255, 0.4);
      color: rgba(0, 246, 255, 0.9);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 10px #22c55e;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ===== RESPONSIVE ADJUSTMENTS ===== */
    @media (max-width: 640px) {
      .cyber-title {
        font-size: 2.5rem !important;
      }
      
      .dept-card {
        font-size: 1rem;
        padding: 1.25rem;
      }

      .dept-icon {
        font-size: 1.5rem;
      }

      .hub-container {
        margin: 1rem;
      }
    }

    /* ===== LOADING ANIMATION ===== */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in-up {
      animation: fadeInUp 0.8s ease-out backwards;
    }

    .stagger-1 { animation-delay: 0.1s; }
    .stagger-2 { animation-delay: 0.2s; }
    .stagger-3 { animation-delay: 0.3s; }
    .stagger-4 { animation-delay: 0.4s; }
    .stagger-5 { animation-delay: 0.5s; }
    .stagger-6 { animation-delay: 0.6s; }
    .stagger-7 { animation-delay: 0.7s; }
  </style>
</head>
<body>
  
  <!-- Video Background -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="bg.mp4" type="video/mp4">
  </video>

  <!-- Overlays -->
  <div class="dark-gradient"></div>
  <div class="grid-overlay"></div>
  <div class="tv-scanlines"></div>
  
  <!-- Floating Particles -->
  <div class="particles" id="particles-container"></div>

  <!--  UI Toggle Button -->
  


  <!-- Main Content -->
  <div class="min-h-screen flex items-center justify-center p-4 md:p-8">
    <div class="hub-container max-w-5xl w-full">
      
      <!-- Header -->
      <div class="text-center pt-10 pb-8 px-6 fade-in-up">
        <h1 class="cyber-title text-5xl md:text-7xl mb-6" data-text="LOS SANTOS DOCUMENTS">
          LOS SANTOS DOCUMENTS
        </h1>
        <div class="operator-tag fade-in-up stagger-1">
          Made By King Amxn (Aman Paliya)
        </div>
      </div>

      <!-- Department Grid -->
      <div class="dept-grid px-6 md:px-10 pb-8">
        
        <a class='dept-card fib-card rounded-xl fade-in-up stagger-2' href='fib.html'>
          <span class="dept-icon">🎯</span>
          <span>FIB Bodycam Commands</span>
        </a>

        <a class='dept-card lspd-card rounded-xl fade-in-up stagger-3' href='lspd.html'>
          <span class="dept-icon">👮</span>
          <span>LSPD Bodycam Commands</span>
        </a>

        <a class='dept-card sahp-card rounded-xl fade-in-up stagger-4' href='sahp.html'>
          <span class="dept-icon">🚔</span>
          <span>SAHP Bodycam Commands</span>
        </a>

        <a class='dept-card gov-card rounded-xl fade-in-up stagger-5' href='gov.html'>
          <span class="dept-icon">🏛️</span>
          <span>GOV Bodycam Commands</span>
        </a>

        <a class='dept-card ng-card rounded-xl fade-in-up stagger-7' href='ng.html'>
          <span class="dept-icon">🪖</span>
          <span>NG Bodycam Commands</span>
        </a>

        <a class='dept-card badcops-card rounded-xl fade-in-up stagger-7' href='badcop.html' style='animation-delay: 0.75s;'>
          <span class="dept-icon">👿</span>
          <span>Bad Cops Commands</span>
        </a>

        <a class='dept-card arrest-card rounded-xl fade-in-up stagger-7' href='arrest-protocol.html' style='animation-delay: 0.75s;'>
          <span class="dept-icon">⚖️</span>
          <span>ARREST PENAL CODES</span>
        </a>

        <!-- <a href="/Penalcode.html" class="dept-card penal-card rounded-xl fade-in-up stagger-6">
          <span class="dept-icon">⚖️</span>
          <span>EN3 • Penal Codes</span>
        </a> -->
      </div>

      <!-- Status Bar -->
      <div class="status-bar fade-in-up" style="animation-delay: 0.8s;">
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span>SYSTEM ONLINE</span>
        </div>
        <div>
          <span id="current-time"></span>
        </div>
      </div>

    </div>
    
  </div>

  <script>
    // Generate floating particles
    const particlesContainer = document.getElementById('particles-container');
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 20 + 's';
      particle.style.animationDuration = (15 + Math.random() * 10) + 's';
      particlesContainer.appendChild(particle);
    }

    // Update time
    function updateTime() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('en-US', { 
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      document.getElementById('current-time').textContent = timeString;
    }
    updateTime();
    setInterval(updateTime, 1000);

    // Add click ripple effect
    document.querySelectorAll('.dept-card').forEach(card => {
      card.addEventListener('click', function(e) {
        const ripple = document.createElement('span');
        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        const x = e.clientX - rect.left - size / 2;
        const y = e.clientY - rect.top - size / 2;
        
        ripple.style.cssText = `
          position: absolute;
          width: ${size}px;
          height: ${size}px;
          border-radius: 50%;
          background: rgba(255, 255, 255, 0.3);
          left: ${x}px;
          top: ${y}px;
          pointer-events: none;
          animation: ripple 0.6s ease-out;
        `;
        
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });

    // Add ripple animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes ripple {
        from {
          transform: scale(0);
          opacity: 1;
        }
        to {
          transform: scale(2);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);

    document.head.appendChild(style);

    
     document.addEventListener("contextmenu", function(e) {
     e.preventDefault();
     });

    document.addEventListener("keydown", function(e) {
    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && ["I", "J", "C"].includes(e.key.toUpperCase())) ||
        (e.ctrlKey && e.key.toUpperCase() === "U")
    ) {
        e.preventDefault();
    }
    });
    
  </script>

</body>
</html>
